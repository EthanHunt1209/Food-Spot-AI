<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rasa — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--bg2:#131313;--bg3:#191919;--bg4:#212121;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);--text:#f0ede8;--text2:#a09a94;--text3:#5e5a56;--accent:#e8c17a;--accent3:#7ec8a4;--red:#e07070;--font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--r:10px;--rl:16px;--rxl:22px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
nav{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(13,13,13,.95);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem}
.logo{font-family:var(--font-h);font-size:20px;font-weight:800;color:var(--accent);text-decoration:none;letter-spacing:-.5px}
.logo em{color:var(--text);font-style:normal}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rxl);padding:2rem;width:100%;max-width:400px;margin-top:54px}
.card-title{font-family:var(--font-h);font-size:22px;font-weight:800;margin-bottom:.35rem}
.card-sub{font-size:13px;color:var(--text2);margin-bottom:1.75rem;line-height:1.6}
.fl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem;display:block}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 13px;font-size:14px;font-family:var(--font-b);color:var(--text);outline:none;transition:border-color .18s;margin-bottom:.85rem}
.fi:focus{border-color:rgba(232,193,122,.35)}
.fi::placeholder{color:var(--text3)}
.btn{display:block;width:100%;padding:11px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-b);transition:all .18s;background:var(--accent);color:#0d0d0d;text-align:center}
.btn:hover{background:#f0cc88}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:1rem;display:none}
.msg.ok{background:rgba(126,200,164,.1);color:var(--accent3);border:1px solid rgba(126,200,164,.2)}
.msg.err{background:rgba(224,112,112,.1);color:var(--red);border:1px solid rgba(224,112,112,.2)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.2);border-top-color:#0d0d0d;border-radius:50%;animation:rot .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes rot{to{transform:rotate(360deg)}}
.pw-wrap{position:relative;margin-bottom:.85rem}
.pw-wrap .fi{margin-bottom:0;padding-right:42px}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px;line-height:1}
.eye-btn:hover{color:var(--text2)}
.strength{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:.85rem}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}
.back-link{display:block;text-align:center;margin-top:1rem;font-size:13px;color:var(--text3)}
.back-link a{color:var(--accent);text-decoration:none}
.back-link a:hover{text-decoration:underline}
</style>
</head>
<body>
<nav><a class="logo" href="/">Rasa<em>.</em></a></nav>

<div class="card" id="reset-card">
  <div class="card-title">Set new password</div>
  <div class="card-sub">Choose a strong password for your Rasa account.</div>
  <div class="msg" id="msg"></div>
  <label class="fl">New password</label>
  <div class="pw-wrap">
    <input class="fi" type="password" id="pw1" placeholder="Min 6 characters" oninput="checkStrength()">
    <button class="eye-btn" onclick="togglePw('pw1',this)">👁</button>
  </div>
  <div class="strength"><div class="strength-fill" id="str-fill" style="width:0%"></div></div>
  <label class="fl">Confirm password</label>
  <div class="pw-wrap">
    <input class="fi" type="password" id="pw2" placeholder="Repeat password">
    <button class="eye-btn" onclick="togglePw('pw2',this)">👁</button>
  </div>
  <button class="btn" id="reset-btn" onclick="doReset()">Reset Password</button>
  <div class="back-link"><a href="/">← Back to login</a></div>
</div>

<div class="card" id="done-card" style="display:none;text-align:center">
  <div style="font-size:40px;margin-bottom:1rem">✅</div>
  <div class="card-title">Password reset!</div>
  <div class="card-sub">Your password has been updated. You can now log in with your new password.</div>
  <a class="btn" href="/" style="text-decoration:none;margin-top:.5rem">Go to Login →</a>
</div>

<script>
const API = window.location.port === '5000' ? '/api' : 'http://localhost:5000/api';

// Get token + email from URL
const params = new URLSearchParams(window.location.search);
const TOKEN  = params.get('token');
const EMAIL  = params.get('email');

if (!TOKEN || !EMAIL) {
  showMsg('err', 'Invalid reset link. Please request a new one from the login page.');
  document.getElementById('reset-btn').disabled = true;
}

function checkStrength() {
  const pw   = document.getElementById('pw1').value;
  const fill = document.getElementById('str-fill');
  let score  = 0;
  if (pw.length >= 6)   score++;
  if (pw.length >= 10)  score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const pct   = (score / 5) * 100;
  const color = score <= 1 ? '#e07070' : score <= 3 ? '#e8c17a' : '#7ec8a4';
  fill.style.width      = pct + '%';
  fill.style.background = color;
}

function togglePw(id, btn) {
  const el  = document.getElementById(id);
  const vis = el.type === 'password';
  el.type   = vis ? 'text' : 'password';
  btn.textContent = vis ? '🙈' : '👁';
}

function showMsg(type, text) {
  const el = document.getElementById('msg');
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}

async function doReset() {
  const btn   = document.getElementById('reset-btn');
  const pw1   = document.getElementById('pw1').value;
  const pw2   = document.getElementById('pw2').value;

  if (!pw1 || pw1.length < 6) { showMsg('err', 'Password must be at least 6 characters.'); return; }
  if (pw1 !== pw2)             { showMsg('err', 'Passwords do not match.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Resetting…';

  try {
    const resp = await fetch(`${API}/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, email: EMAIL, newPassword: pw1 }),
    });
    const data = await resp.json();
    if (!data.success) { showMsg('err', data.message); btn.disabled=false; btn.textContent='Reset Password'; return; }
    document.getElementById('reset-card').style.display = 'none';
    document.getElementById('done-card').style.display  = 'block';
  } catch (e) {
    showMsg('err', 'Network error. Please try again.');
    btn.disabled = false; btn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>
